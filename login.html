<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>Iniciar sesión — Brain</title>

  <link href="assets/img/brain.ico" rel="icon">
  <link href="assets/img/apple-touch-icon.png" rel="apple-touch-icon">

  <link href="https://fonts.googleapis.com" rel="preconnect">
  <link href="https://fonts.gstatic.com" rel="preconnect" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <link href="assets/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
  <link href="assets/vendor/bootstrap-icons/bootstrap-icons.css" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; }

    :root {
      --bg:            #070c14;
      --bg-elevated:   #0b1221;
      --surface:       #0f1929;
      --accent:        #2563EB;
      --accent-light:  #3B82F6;
      --accent-glow:   rgba(37,99,235,0.35);
      --accent-border: rgba(37,99,235,0.25);
      --accent-bg:     rgba(37,99,235,0.08);
      --border:        rgba(255,255,255,0.06);
      --border-hover:  rgba(37,99,235,0.35);
      --heading:       #f9fafb;
      --text:          rgba(255,255,255,0.80);
      --muted:         #6b7280;
    }

    html, body {
      height: 100%;
      margin: 0;
      font-family: "Inter", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    /* ── Background blobs ── */
    .bg-blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      pointer-events: none;
      z-index: 0;
    }
    .blob-1 {
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(37,99,235,0.18) 0%, transparent 70%);
      top: -200px; left: -200px;
      animation: blobFloat 12s ease-in-out infinite alternate;
    }
    .blob-2 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(37,99,235,0.10) 0%, transparent 70%);
      bottom: -150px; right: -150px;
      animation: blobFloat 16s ease-in-out infinite alternate-reverse;
    }
    .blob-3 {
      width: 300px; height: 300px;
      background: radial-gradient(circle, rgba(99,102,241,0.08) 0%, transparent 70%);
      top: 40%; left: 60%;
      animation: blobFloat 20s ease-in-out infinite alternate;
    }
    @keyframes blobFloat {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(30px, 20px) scale(1.05); }
    }

    /* Grid overlay */
    .grid-overlay {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(37,99,235,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(37,99,235,0.04) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Layout ── */
    .login-wrapper {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    /* ── 3D perspective card floating behind ── */
    .deco-screen {
      position: fixed;
      right: -80px;
      top: 50%;
      transform: translateY(-50%) perspective(900px) rotateY(-18deg) rotateX(4deg);
      width: 560px;
      opacity: 0.18;
      pointer-events: none;
      z-index: 0;
    }
    .deco-screen-inner {
      background: #0a1020;
      border: 1px solid rgba(37,99,235,0.3);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 30px 80px rgba(0,0,0,0.7), 0 0 0 1px rgba(37,99,235,0.1);
    }
    .deco-bar {
      background: #111827;
      height: 32px;
      display: flex;
      align-items: center;
      padding: 0 14px;
      gap: 6px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .deco-dot { width: 8px; height: 8px; border-radius: 50%; }
    .deco-body { padding: 20px; display: flex; flex-direction: column; gap: 12px; }
    .deco-row { height: 8px; border-radius: 4px; background: rgba(255,255,255,0.05); }
    .deco-row.accent { background: rgba(37,99,235,0.3); }
    .deco-row.green  { background: rgba(34,197,94,0.2); }
    .deco-cols { display: flex; gap: 12px; margin-top: 4px; }
    .deco-col  { flex: 1; display: flex; flex-direction: column; gap: 8px; }
    .deco-kpi  { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 8px; padding: 10px 12px; }
    .deco-kpi-num { height: 14px; width: 60%; background: rgba(37,99,235,0.4); border-radius: 3px; margin-bottom: 6px; }
    .deco-kpi-lbl { height: 6px; width: 80%; background: rgba(255,255,255,0.05); border-radius: 3px; }

    /* ── Login card ── */
    .login-card {
      width: 100%;
      max-width: 400px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px 36px;
      position: relative;
      box-shadow: 0 24px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(37,99,235,0.06);
    }
    .login-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      border-radius: 20px 20px 0 0;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
    }

    /* Logo */
    .login-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
    }
    .login-logo img { width: 32px; height: 32px; }
    .login-logo-name {
      font-size: 18px;
      font-weight: 900;
      color: var(--heading);
      letter-spacing: -0.4px;
    }

    /* Heading */
    .login-heading {
      font-size: 22px;
      font-weight: 900;
      color: var(--heading);
      letter-spacing: -0.5px;
      margin-bottom: 4px;
    }
    .login-sub {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 28px;
    }

    /* Form */
    .form-group { margin-bottom: 16px; }
    .form-label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #9ca3af;
      margin-bottom: 6px;
      letter-spacing: 0.3px;
    }
    .form-input-wrap { position: relative; }
    .form-input-wrap .input-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 15px;
      pointer-events: none;
    }
    .form-control-dark {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--heading);
      font-family: "Inter", sans-serif;
      font-size: 14px;
      padding: 11px 12px 11px 38px;
      outline: none;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
    }
    .form-control-dark::placeholder { color: #374151; }
    .form-control-dark:focus {
      border-color: var(--accent-border);
      background: rgba(37,99,235,0.06);
      box-shadow: 0 0 0 3px rgba(37,99,235,0.12);
    }

    /* Forgot link */
    .forgot-link {
      display: block;
      text-align: right;
      font-size: 11px;
      color: var(--accent-light);
      text-decoration: none;
      margin-top: -10px;
      margin-bottom: 22px;
      opacity: 0.8;
      transition: opacity 0.2s;
    }
    .forgot-link:hover { opacity: 1; }

    /* Submit button */
    .btn-login {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: "Inter", sans-serif;
      font-size: 14px;
      font-weight: 700;
      padding: 12px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: background 0.2s, box-shadow 0.2s, transform 0.1s;
      letter-spacing: 0.2px;
    }
    .btn-login::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent 60%);
      pointer-events: none;
    }
    .btn-login:hover {
      background: #1D4ED8;
      box-shadow: 0 8px 24px rgba(37,99,235,0.4);
      transform: translateY(-1px);
    }
    .btn-login:active { transform: translateY(0); }

    /* Divider */
    .login-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
    }
    .login-divider::before,
    .login-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .login-divider span { font-size: 11px; color: var(--muted); white-space: nowrap; }

    /* Back link */
    .back-link {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-size: 13px;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--accent-light); }

    /* Status tag */
    .login-status {
      position: absolute;
      top: 16px;
      right: 16px;
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: #4ade80;
      background: rgba(74,222,128,0.08);
      border: 1px solid rgba(74,222,128,0.2);
      border-radius: 20px;
      padding: 4px 10px;
    }
    .login-status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #4ade80;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    /* Mobile — hide deco screen */
    @media (max-width: 991px) {
      .deco-screen { display: none; }
      html, body { overflow: auto; }
    }
  </style>
</head>

<body>

  <!-- Background -->
  <div class="bg-blob blob-1"></div>
  <div class="bg-blob blob-2"></div>
  <div class="bg-blob blob-3"></div>
  <div class="grid-overlay"></div>

  <!-- Decorative 3D screen (desktop only) -->
  <div class="deco-screen">
    <div class="deco-screen-inner">
      <div class="deco-bar">
        <div class="deco-dot" style="background:#ef4444;"></div>
        <div class="deco-dot" style="background:#f59e0b;"></div>
        <div class="deco-dot" style="background:#22c55e;"></div>
      </div>
      <div class="deco-body">
        <div class="deco-row accent" style="width:55%;"></div>
        <div class="deco-row" style="width:80%;"></div>
        <div class="deco-cols">
          <div class="deco-col">
            <div class="deco-kpi"><div class="deco-kpi-num"></div><div class="deco-kpi-lbl"></div></div>
            <div class="deco-kpi"><div class="deco-kpi-num" style="background:rgba(34,197,94,0.3);"></div><div class="deco-kpi-lbl"></div></div>
          </div>
          <div class="deco-col">
            <div class="deco-row green" style="width:90%; margin-bottom:6px;"></div>
            <div class="deco-row" style="width:70%; margin-bottom:6px;"></div>
            <div class="deco-row accent" style="width:100%;"></div>
          </div>
        </div>
        <div class="deco-row" style="width:60%;"></div>
        <div class="deco-row accent" style="width:40%;"></div>
        <div class="deco-cols">
          <div class="deco-col">
            <div class="deco-row" style="width:100%;"></div>
            <div class="deco-row green" style="width:75%;"></div>
          </div>
          <div class="deco-col">
            <div class="deco-row accent" style="width:80%;"></div>
            <div class="deco-row" style="width:60%;"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Login card -->
  <div class="login-wrapper">
    <div class="login-card">

      <div class="login-status">
        <div class="login-status-dot"></div>
        Sistemas operativos
      </div>

      <div class="login-logo">
        <img src="assets/img/brain.ico" alt="Brain Logo">
        <span class="login-logo-name">Brain</span>
      </div>

      <div class="login-heading">Bienvenido de vuelta</div>
      <div class="login-sub">Accedé a tu panel de automatización</div>

      <form onsubmit="return false;">
        <div class="form-group">
          <label class="form-label">Email</label>
          <div class="form-input-wrap">
            <i class="bi bi-envelope input-icon"></i>
            <input type="email" class="form-control-dark" placeholder="tu@empresa.com" autocomplete="email">
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Contraseña</label>
          <div class="form-input-wrap">
            <i class="bi bi-lock input-icon"></i>
            <input type="password" class="form-control-dark" placeholder="••••••••" autocomplete="current-password">
          </div>
        </div>

        <a href="#" class="forgot-link">¿Olvidaste tu contraseña?</a>

        <button type="submit" class="btn-login">
          Iniciar sesión &nbsp;<i class="bi bi-arrow-right"></i>
        </button>
      </form>

      <div class="login-divider"><span>o volvé al sitio</span></div>

      <a href="index.html" class="back-link">
        <i class="bi bi-arrow-left"></i> Volver al inicio
      </a>

    </div>
  </div>

  <script src="assets/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
</body>
</html>
