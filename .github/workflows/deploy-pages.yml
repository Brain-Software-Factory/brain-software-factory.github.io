name: Deploy to GitHub Pages

# Publica el sitio en GitHub Pages (entorno de preview/dev) en cada push a
# develop. Sitio estático: no hay build, solo se empaqueta el contenido y se
# publica. El source de Pages debe estar en "GitHub Actions" (Settings → Pages).

on:
  push:
    branches: [develop]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: deploy-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Preparar artefacto
        run: |
          mkdir -p _site
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.superpowers' \
            --exclude='_site' \
            ./ _site/

      - name: Configurar Pages
        uses: actions/configure-pages@v5

      - name: Subir artefacto
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy a GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
