name: Deploy to dev server

# Publica el sitio en el servidor de desarrollo (stack landing-brain → nginx)
# en cada push a main. nginx sirve un bind-mount del directorio, así que con
# sincronizar los archivos alcanza — no hace falta reiniciar nada.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-dev
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEV_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.DEV_SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy (rsync)
        run: |
          rsync -az --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.superpowers' \
            -e "ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes" \
            ./ "${{ secrets.DEV_SSH_USER }}@${{ secrets.DEV_SSH_HOST }}:${{ secrets.DEV_SSH_PATH }}/"

      - name: Verificar publicación
        run: |
          code=$(curl -s -o /dev/null -w '%{http_code}' https://brain.com.ar || echo "000")
          echo "brain.com.ar -> HTTP $code"
